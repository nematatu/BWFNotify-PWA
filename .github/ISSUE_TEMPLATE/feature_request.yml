name: 改善提案
description: 新機能または既存機能の改善を提案します
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: 機能名ではなく、利用時に困っていることを記載してください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する変更
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
  - type: textarea
    id: load
    attributes:
      label: 外部API・KV・通知への影響
      description: 取得回数、保存量、通知頻度が変わる場合は記載してください。
  - type: checkboxes
    id: checks
    attributes:
      label: 確認
      options:
        - label: 同じ内容のIssueがないことを確認しました。
          required: true
