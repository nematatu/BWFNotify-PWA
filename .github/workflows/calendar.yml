name: 大会情報更新

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baj-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run update:calendar
      - name: 変更がある場合のみ反映
        run: |
          if git diff --quiet -- config/upcoming-tournaments.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/upcoming-tournaments.json
          HUSKY=0 git commit -m "chore: 大会情報を更新"
          git push
