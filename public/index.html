<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#ffffff" />
		<meta name="description" content="日本人選手が出場するBWFライブ試合の通知" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<link rel="stylesheet" href="/app.css" />
		<title>BWF 日本人選手通知</title>
	</head>
	<body>
		<main>
			<header class="app-header">
				<h1>BWF 日本人選手通知</h1>
			</header>

			<section class="notification-settings" aria-labelledby="notification-heading">
				<div>
					<h2 id="notification-heading">通知</h2>
					<p id="notification-status" role="status">確認中</p>
				</div>
				<div class="notification-controls">
					<button id="test-notification-button" type="button" disabled>
						テスト通知
					</button>
					<label class="switch">
						<span class="visually-hidden">プッシュ通知</span>
						<input id="notification-toggle" type="checkbox" disabled />
						<span class="switch-track" aria-hidden="true"></span>
					</label>
				</div>
			</section>

			<section class="matches" aria-labelledby="matches-heading">
				<div class="section-heading">
					<h2 id="matches-heading">ライブ中の試合</h2>
					<button id="refresh-button" type="button">再読み込み</button>
				</div>
				<p id="last-updated">未取得</p>
				<div id="match-list" class="match-list" aria-live="polite">
					<p class="empty-state">読み込み中</p>
				</div>
			</section>
		</main>
		<script type="module" src="/app.js"></script>
	</body>
</html>
